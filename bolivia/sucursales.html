<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestras Sucursales </title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="sucursales.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="indexbo.html">Inicio</a></li>
                <li><a href="indexbo.html#nosotros">Nosotros</a></li>
                <li><a href="menu.html">Menú</a></li>
                <li><a href="promos.html">Promos</a></li>
                <li><a href="sucursales.html">Sucursales</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>

            <div class="logo-container">
                <a href="indexbo.html" class="logo-hanging">
                    <img src="../combos/LOGO SIN TEXTO ABAJO.png" alt="Logo Pollo El Solar">
                </a>
            </div>

            <div class="nav-actions">
                <a href="https://wa.me/591XXXXXXXX" target="_blank" class="btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> PEDIR AHORA
                </a>
                <div class="menu-toggle" id="mobile-menu">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </nav>
    </header>

    <div class="contenedor-mapa-global">
        <div id="mapa"></div>

        <div class="overlay-titulo">
            <h1>Nuestras Sucursales</h1>
            <p>El sabor de El Solar, siempre cerca de ti</p>
        </div>

        <div id="wrapper-sucursales">
            <div id="lista-cards-horizontal">
                </div>
        </div>

        <div id="detalle-sucursal-overlay" class="hidden">
            <button class="btn-cerrar" onclick="cerrarDetalle()">×</button>
            <div id="contenido-detalle"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const sucursales = [
            { id: 1, nombre: "Sucursal Cañoto", lat: -17.786538279939435, lng: -63.18826980007806, direccion: "Av. Cañoto, Esq. suarez de figueroa", horario: "11:00 - 23:00" },
            { id: 2, nombre: "Sucursal Isuto", lat: -17.754683227688286, lng: -63.19007245767147, direccion: "Av. La salle, Esq. francisco herbas", horario: "11:00 - 23:00" },
            { id: 3, nombre: "Sucursal km6", lat:-17.828320875390002, lng: -63.22672882883573, direccion: "Av. Doble vía a la guardia, 6to anillo", horario: "11:00 - 23:00" },
            { id: 4, nombre: "Sucursal Indana", lat: -17.79288957318133, lng: -63.20515189999999, direccion: "Av. tercer anillo, Patio de comidas de comercial indana", horario: "11:00 - 23:00" },
            { id: 5, nombre: "Sucursal Megacenter", lat:-17.797689769632857, lng:-63.17940523068588, direccion: "Av. El trompillo, Patio de comidas megacenter", horario:"11:00 - 23:00" },
            { id: 6, nombre: "Sucursal Autopia", lat:-17.760061193424963, lng: -63.1744533865072, direccion: "Av. Beni, tercer anillo interno", horario: "11:00 - 23:00"},
            { id: 7, nombre: "Sucursal Santos Dumont", lat:-17.817786537546485, lng: -63.183372855821325, direccion: "Av. Santos dumont entre 3er y 4to anillo, calle wenceslao hurtado", horario: "11:00 - 23:00"},
            { id: 8, nombre: "Sucursal Norte", lat:-17.721265058474124, lng:-63.163792075988574, direccion:"Av. Cristo redentor entre 7mo y 8vo anillo", horario:"11:00 - 23:00"},
            { id: 9, nombre: "Sucursal Villa 1ro de mayo", lat: -17.798005666167317, lng:-63.13425402263632, direccion:"Av. 1ro de mayo, Patio de comidas hipermaxi", horario:"11:00 - 23:00"},
            { id: 10, nombre: "Sucursal Virgen de cotoca",lat: -17.781437946651906, lng:-63.153303461371756, direccion:"Av. Virgen de cotoca entre 3er anillo interno y 3er anillo externo", horario:"11:00 - 23:00"},
            { id: 11, nombre: "Sucursal Pampa", lat:-17.767501914512312, lng:-63.113195688948494, direccion:"Av. Virgen de cotoca, B/ El mundo", horario:"11:00 - 23:00"},
            { id: 12, nombre: "Sucursal Plan 3000", lat:-17.824039923762594, lng:-63.143684855821334, direccion:"Av. paurito esquina calle 1", horario:"11:00 - 23:00"},
            { id: 13, nombre: "Sucursal Ventura mall", lat:-17.753756242407114, lng:-63.19939763376639, direccion:"Av. Cuarto anillo, patio de comidas del ventura mall", horario:"11:00- 23:00"},
            { id: 14, nombre: "Sucursal cambodromo", lat:-17.741799486525704, lng:-63.14419836462262, direccion: "Av. Mutualista 6to anillo, patio de comidas del hipermaxi", horario:"11:00 - 23:00"}
        ];

        // Inicializar mapa
        const map = L.map('mapa').setView([-17.7833, -63.1821], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const listaCards = document.getElementById('lista-cards-horizontal');
        const detalleOverlay = document.getElementById('detalle-sucursal-overlay');
        const contenidoDetalle = document.getElementById('contenido-detalle');

        function cargarCards() {
            let html = '';
            sucursales.forEach(s => {
                html += `
                    <div class="card-sucursal-mini" id="card-${s.id}" onclick="seleccionarSucursal(${s.id})">
                        <h3 style="color: var(--rojo); margin-bottom: 5px; font-size:1.1rem;">${s.nombre}</h3>
                        <p style="font-size: 0.75rem; color: #666; line-height:1.2;"><i class="fas fa-map-marker-alt"></i> ${s.direccion}</p>
                    </div>
                `;
            });
            listaCards.innerHTML = html;
        }

        function seleccionarSucursal(id) {
            const s = sucursales.find(item => item.id === id);
            map.flyTo([s.lat, s.lng], 16, { duration: 1.5 });

            detalleOverlay.classList.remove('hidden');
            contenidoDetalle.innerHTML = `
                <h2 style="color:var(--rojo); margin-bottom:10px;">${s.nombre}</h2>
                <p style="font-size:0.9rem;"><strong>Dirección:</strong> ${s.direccion}</p>
                <p style="font-size:0.9rem;"><strong>Horario:</strong> ${s.horario}</p>
                <img src="../fotos/sucursal-${s.id}.jpg" onerror="this.src='https://via.placeholder.com/300x150?text=Pollo+El+Solar'" style="width:100%; border-radius:15px; margin: 15px 0; object-fit:cover; height:150px;">
                <a href="https://www.google.com/maps?q=${s.lat},${s.lng}" target="_blank" class="btn-whatsapp" style="justify-content:center; background:var(--rojo);">
                    VER EN GOOGLE MAPS
                </a>
            `;

            // Opcional: Desplazar la card seleccionada al centro de la vista
            document.getElementById(`card-${id}`).scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        function cerrarDetalle() {
            detalleOverlay.classList.add('hidden');
        }

        // Marcadores
        sucursales.forEach(s => {
            const customIcon = L.divIcon({
                className: 'marker-solar',
                html: `<img src="../fotos/logito.png" style="width:40px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5))">`,
                iconSize: [40, 40]
            });

            const marker = L.marker([s.lat, s.lng], { icon: customIcon }).addTo(map);
            marker.on('click', () => seleccionarSucursal(s.id));
        });

        cargarCards();
    </script>
</body>
</html>
